<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro AI Assistant - Chat & Image</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown Formatting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for Security -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.3/purify.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #343541; color: #ececf1; }
        .sidebar { background-color: #202123; }
        .chat-bg-ai { background-color: #444654; }
        .chat-bg-user { background-color: #343541; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #565869; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #717282; }

        /* Markdown Styles */
        .prose pre { background-color: #000 !important; color: #fff; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-top: 0.5rem; }
        .prose code { background-color: #2a2b32; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; }
        .prose p { margin-bottom: 0.75rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose strong { color: #fff; font-weight: 600; }
        .prose img { max-width: 100%; border-radius: 0.5rem; margin-top: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        /* Loading Dot Animation */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm md:text-base">

    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar (History) -->
    <div id="sidebar" class="sidebar fixed md:relative w-64 h-full flex flex-col transition-transform transform -translate-x-full md:translate-x-0 z-30 border-r border-white/10">
        <div class="p-3">
            <button onclick="startNewChat()" class="flex items-center gap-3 w-full border border-white/20 hover:bg-white/5 p-3 rounded-md transition-colors text-left text-white">
                <i class="fa-solid fa-plus"></i> New chat
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-3 space-y-2" id="chat-history-list">
            <!-- History items inject here -->
        </div>
        <div class="p-3 border-t border-white/10">
            <button onclick="toggleSettings()" class="flex items-center gap-3 w-full hover:bg-white/5 p-3 rounded-md transition-colors text-left text-white">
                <i class="fa-solid fa-gear"></i> Settings / API Key
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full w-full relative">
        
        <!-- Header -->
        <header class="flex items-center justify-between md:justify-center p-4 text-gray-200 border-b border-white/10 bg-[#343541]">
            <button class="md:hidden text-white p-2" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <h1 class="text-lg font-semibold tracking-wide flex items-center gap-2">
                <i class="fa-solid fa-robot text-blue-400"></i> AI Assistant
            </h1>
            <div class="w-8 md:hidden"></div> <!-- Spacer for mobile flex balance -->
        </header>

        <!-- Settings Modal (Hidden) -->
        <div id="settings-modal" class="hidden absolute top-16 right-4 md:right-1/2 md:translate-x-1/2 bg-[#202123] p-6 rounded-xl shadow-2xl border border-white/10 z-50 w-80 md:w-96">
            <h3 class="font-bold text-lg mb-2 text-white">Configuration</h3>
            <p class="text-xs text-gray-400 mb-4">Enter your Gemini API key from Google AI Studio. It is saved locally in your browser.</p>
            <input type="password" id="api-key-input" placeholder="sk-..." class="w-full bg-[#40414f] border border-gray-600 rounded p-3 mb-4 text-white focus:outline-none focus:border-blue-500">
            <div class="flex justify-end gap-2">
                <button onclick="toggleSettings()" class="px-4 py-2 rounded text-gray-300 hover:bg-gray-700 transition">Cancel</button>
                <button onclick="saveApiKey()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-white transition font-medium">Save Key</button>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto">
            <!-- Welcome Screen -->
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center p-6">
                <div class="bg-blue-600 p-4 rounded-full mb-6 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-bolt text-4xl text-white"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">How can I help you today?</h2>
                <p class="text-gray-400 max-w-md mx-auto mb-8">Chat with advanced AI or generate high-quality images. Don't forget to set your API Key in Settings!</p>
            </div>
            <!-- Messages will be injected here -->
            <div id="messages-list" class="pb-32"></div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-[#343541] via-[#343541] to-transparent pt-6">
            <div class="max-w-4xl mx-auto px-4 pb-6">
                <!-- Mode Toggle (Chat / Image) -->
                <div class="flex items-center gap-2 mb-2 bg-[#40414f] w-fit p-1 rounded-lg">
                    <button id="mode-chat" onclick="setMode('chat')" class="px-4 py-1.5 rounded-md bg-[#565869] text-white font-medium text-sm transition-all shadow-sm">
                        <i class="fa-solid fa-message mr-1"></i> Text AI
                    </button>
                    <button id="mode-image" onclick="setMode('image')" class="px-4 py-1.5 rounded-md text-gray-400 hover:text-white font-medium text-sm transition-all">
                        <i class="fa-solid fa-image mr-1"></i> Image Generator
                    </button>
                </div>

                <form id="chat-form" onsubmit="handleSend(event)" class="relative flex items-end bg-[#40414f] rounded-xl border border-white/10 shadow-xl">
                    <textarea id="user-input" rows="1" placeholder="Send a message..." class="w-full max-h-48 bg-transparent text-white p-4 pr-12 focus:outline-none resize-none overflow-y-auto" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                    <button type="submit" id="send-btn" class="absolute right-3 bottom-3 p-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
                <div class="text-center text-xs text-gray-500 mt-3">
                    AI can make mistakes. Verify important information.
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Variables
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let chats = JSON.parse(localStorage.getItem('ai_chats_data')) || [];
        let currentChatId = null;
        let isImageMode = false;

        // Initialize App
        if (apiKey) document.getElementById('api-key-input').value = apiKey;
        renderSidebar();

        // --- UI Interactions ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function saveApiKey() {
            apiKey = document.getElementById('api-key-input').value.trim();
            localStorage.setItem('gemini_api_key', apiKey);
            toggleSettings();
            alert('API Key Saved successfully!');
        }

        function setMode(mode) {
            isImageMode = (mode === 'image');
            const chatBtn = document.getElementById('mode-chat');
            const imgBtn = document.getElementById('mode-image');
            const input = document.getElementById('user-input');

            if (isImageMode) {
                imgBtn.classList.add('bg-[#565869]', 'text-white', 'shadow-sm');
                imgBtn.classList.remove('text-gray-400');
                chatBtn.classList.remove('bg-[#565869]', 'text-white', 'shadow-sm');
                chatBtn.classList.add('text-gray-400');
                input.placeholder = "Describe the image you want to generate...";
            } else {
                chatBtn.classList.add('bg-[#565869]', 'text-white', 'shadow-sm');
                chatBtn.classList.remove('text-gray-400');
                imgBtn.classList.remove('bg-[#565869]', 'text-white', 'shadow-sm');
                imgBtn.classList.add('text-gray-400');
                input.placeholder = "Send a message...";
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend(e);
            }
        }

        // --- Core Chat Logic ---
        function startNewChat() {
            currentChatId = Date.now().toString();
            chats.unshift({ id: currentChatId, title: 'New Chat', messages: [] });
            saveChats();
            renderSidebar();
            document.getElementById('messages-list').innerHTML = '';
            document.getElementById('welcome-screen').classList.remove('hidden');
            if(window.innerWidth < 768) toggleSidebar(); // Close sidebar on mobile
        }

        function loadChat(id) {
            currentChatId = id;
            document.getElementById('welcome-screen').classList.add('hidden');
            const chat = chats.find(c => c.id === id);
            
            const messagesList = document.getElementById('messages-list');
            messagesList.innerHTML = '';
            
            chat.messages.forEach(msg => {
                appendMessageToUI(msg.role, msg.content, false);
            });
            
            if(window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation(); // Prevent loading the chat when clicking delete
            chats = chats.filter(c => c.id !== id);
            saveChats();
            renderSidebar();
            if (currentChatId === id) {
                document.getElementById('messages-list').innerHTML = '';
                document.getElementById('welcome-screen').classList.remove('hidden');
                currentChatId = null;
            }
        }

        function saveChats() {
            localStorage.setItem('ai_chats_data', JSON.stringify(chats));
        }

        function renderSidebar() {
            const list = document.getElementById('chat-history-list');
            list.innerHTML = '';
            chats.forEach(chat => {
                const btn = document.createElement('div');
                btn.className = `flex justify-between items-center w-full p-3 rounded-md cursor-pointer transition-colors group ${currentChatId === chat.id ? 'bg-[#343541]' : 'hover:bg-[#2a2b32]'}`;
                btn.onclick = () => loadChat(chat.id);
                
                btn.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden text-gray-300">
                        <i class="fa-regular fa-message text-gray-400"></i>
                        <span class="truncate text-sm">${chat.title}</span>
                    </div>
                    <button onclick="deleteChat('${chat.id}', event)" class="text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                list.appendChild(btn);
            });
        }

        async function handleSend(e) {
            e.preventDefault();
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            const sendBtn = document.getElementById('send-btn');

            if (!message) return;
            
            if (!isImageMode && !apiKey) {
                alert('Please set your Gemini API Key in Settings to use Text Chat.');
                toggleSettings();
                return;
            }

            // Initialization for new chat
            if (!currentChatId) startNewChat();
            document.getElementById('welcome-screen').classList.add('hidden');

            // 1. Add User Message to UI & State
            inputField.value = '';
            inputField.style.height = 'auto'; // reset height
            appendMessageToUI('user', message);
            
            const currentChat = chats.find(c => c.id === currentChatId);
            currentChat.messages.push({ role: 'user', content: message });
            
            // Auto-generate title for new chat
            if (currentChat.messages.length === 1) {
                currentChat.title = message.substring(0, 30) + (message.length > 30 ? '...' : '');
                renderSidebar();
            }
            saveChats();

            // Disable Input
            inputField.disabled = true;
            sendBtn.disabled = true;
            
            // Add Loading Indicator
            const loadingId = 'loading-' + Date.now();
            appendLoading(loadingId);

            try {
                if (isImageMode) {
                    // --- IMAGE GENERATION (Using Pollinations AI - Free, no key needed) ---
                    const encodedPrompt = encodeURIComponent(message);
                    const randomSeed = Math.floor(Math.random() * 1000000); 
                    const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&nologo=true&seed=${randomSeed}`;
                    
                    const aiResponseText = `Here is your image:\n\n![Generated Image](${imageUrl})`;
                    
                    removeLoading(loadingId);
                    appendMessageToUI('ai', aiResponseText);
                    currentChat.messages.push({ role: 'ai', content: aiResponseText });
                    saveChats();

                } else {
                    // --- TEXT CHAT (Using Gemini API with updated model version) ---
                    const geminiHistory = currentChat.messages
                        .filter(m => m.role === 'user' || m.role === 'ai')
                        .map(m => ({
                            role: m.role === 'user' ? 'user' : 'model',
                            parts: [{ text: m.content }]
                        }));

                    // Yahan par humne "gemini-1.5-flash" ko "gemini-1.5-flash-latest" se badal diya hai
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: geminiHistory })
                    });

                    const data = await response.json();

                    if (!response.ok) throw new Error(data.error?.message || 'API Error');

                    const aiResponseText = data.candidates[0].content.parts[0].text;
                    
                    removeLoading(loadingId);
                    appendMessageToUI('ai', aiResponseText);
                    currentChat.messages.push({ role: 'ai', content: aiResponseText });
                    saveChats();
                }

            } catch (error) {
                removeLoading(loadingId);
                const errorMsg = `**Error:** ${error.message}. Please check your API key and connection.`;
                appendMessageToUI('ai', errorMsg);
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                inputField.focus();
            }
        }

        // --- UI rendering Helpers ---
        function appendMessageToUI(role, content, animate = false) {
            const container = document.getElementById('messages-list');
            const isUser = role === 'user';
            
            let formattedContent = isUser ? content : marked.parse(content);
            formattedContent = DOMPurify.sanitize(formattedContent);

            const bgClass = isUser ? 'chat-bg-user' : 'chat-bg-ai';
            const icon = isUser ? 
                '<div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-white shrink-0"><i class="fa-solid fa-user"></i></div>' : 
                '<div class="w-8 h-8 rounded-sm bg-[#10a37f] flex items-center justify-center text-white shrink-0 shadow-sm"><i class="fa-solid fa-robot"></i></div>';

            const msgHTML = `
                <div class="w-full ${bgClass} py-6 border-b border-white/5">
                    <div class="max-w-4xl mx-auto flex gap-4 px-4">
                        ${icon}
                        <div class="prose prose-invert max-w-none text-gray-200 overflow-x-auto w-full leading-relaxed">
                            ${isUser ? `<p class="whitespace-pre-wrap">${content}</p>` : formattedContent}
                        </div>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', msgHTML);
            scrollToBottom();
        }

        function appendLoading(id) {
            const container = document.getElementById('messages-list');
            const loadingHTML = `
                <div id="${id}" class="w-full chat-bg-ai py-6 border-b border-white/5">
                    <div class="max-w-4xl mx-auto flex gap-4 px-4 items-center">
                        <div class="w-8 h-8 rounded-sm bg-[#10a37f] flex items-center justify-center text-white shrink-0 shadow-sm">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <div class="flex gap-1 items-center h-8">
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', loadingHTML);
            scrollToBottom();
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if(el) el.remove();
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
